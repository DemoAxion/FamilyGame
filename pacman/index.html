<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Arcade - Pac-Man</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 12px;
            user-select: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 560px;
            font-size: 18px;
        }

        .header .score { color: #fff; }
        .header .high-score { color: #0ff; }
        .header .lives { color: #ff0; }

        canvas {
            border: 2px solid #222;
            background: #000;
        }

        #message {
            font-size: 20px;
            color: #ff0;
            height: 28px;
            letter-spacing: 2px;
        }

        .controls-hint {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="score">SCORE: <span id="score">0</span></div>
        <div class="high-score">HI: <span id="high-score">0</span></div>
        <div class="lives" id="lives"></div>
    </div>
    <canvas id="game" width="560" height="620"></canvas>
    <div id="message">Press any arrow key to start</div>
    <div class="controls-hint">Arrow keys to move</div>
    <script src="pacman.js"></script>
</body>
</html>
