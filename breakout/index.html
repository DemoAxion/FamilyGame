<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Arcade - Breakout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 12px;
            user-select: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: 640px;
            font-size: 18px;
        }

        .score { color: #0ff; }
        .level-display { color: #ff0; }
        .lives-display { color: #f66; }

        canvas {
            border: 2px solid #444;
            background: #000;
        }

        #message {
            font-size: 20px;
            color: #ff0;
            height: 28px;
            letter-spacing: 2px;
        }

        .controls-hint {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="score">SCORE: <span id="score">0</span></div>
        <div class="level-display">LEVEL: <span id="level">1</span></div>
        <div class="lives-display" id="lives"></div>
    </div>
    <canvas id="game" width="640" height="480"></canvas>
    <div id="message">Click or press Space to launch</div>
    <div class="controls-hint">Mouse or Arrow keys to move paddle &bull; Space to launch</div>
    <script src="breakout.js"></script>
</body>
</html>
